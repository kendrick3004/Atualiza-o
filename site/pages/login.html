<!--
    ARQUIVO: login.html
    DESCRIÇÃO: Página de login atualizada para usar Firebase Realtime Database com tratamento de erro de config.
    VERSÃO: 4.2.0 - Feedback visual de erro de configuração
-->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Suite</title>
    
    <!-- SISTEMA DE FÁBRICA: Metadados e Configurações Offline -->
    <script src="/src/js/main/env-loader.js"></script>
    <script src="/src/js/main/factory.js"></script>
    
    <!-- Configurações globais -->
    <script src="/src/js/main/config.js"></script>
    
    <!-- CSS específico da página de login (Design Original) -->
    <link rel="stylesheet" href="/pages/login/login.css">
    <link rel="stylesheet" href="/src/app/update.css">
    <script src="/src/app/update.js"></script>
    
    <style>
        /* Estilo para o divisor e o botão do Google */
        .login-divider {
            width: 100%;
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .login-divider::before, .login-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        .login-divider span {
            padding: 0 10px;
        }
        #googleBtnContainer {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 5px;
        }
        
        /* Estilo para erro crítico de sistema */
        .system-error-banner {
            background: #ef4444;
            color: white;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body class="dark-mode">
    <div class="login-container">
        <div id="systemError" class="system-error-banner">
            ⚠️ O sistema não conseguiu carregar as chaves de segurança. <br>
            Verifique se o servidor está em modo manutenção.
        </div>

        <h1 class="login-title">Acesso Restrito</h1>
        
        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label for="username">Email</label>
                <input type="email" id="username" name="username" placeholder="Digite seu email" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
            </div>
            
            <button type="submit" id="loginSubmitBtn">Entrar</button>
            
            <div class="login-divider">
                <span>ou conecte com</span>
            </div>
            
            <div id="googleBtnContainer">
                <button type="button" id="googleLoginBtn" style="background: white; color: #757575; border: none; padding: 10px 20px; border-radius: 4px; display: flex; align-items: center; font-family: Roboto, sans-serif; cursor: pointer; font-weight: 500;">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width: 18px; margin-right: 10px;">
                    Entrar com Google
                </button>
            </div>
            
            <div id="loginError" class="error"></div>
        </form>
    </div>
    
    <script src="/src/js/main/rate-limiter.js"></script>
    <script src="/src/js/main/firebase-config.js"></script>
    <script src="/pages/login/login-firebase.js"></script>
    
    <script>
        // Monitorar erros de carregamento de configuração
        window.addEventListener('configLoadError', () => {
            document.getElementById('systemError').style.display = 'block';
            document.getElementById('loginSubmitBtn').disabled = true;
            document.getElementById('googleLoginBtn').disabled = true;
            document.getElementById('googleLoginBtn').style.opacity = '0.5';
        });

        (async () => {
            // Se demorar mais de 3 segundos para carregar o Firebase, avisar o usuário
            const timeoutWarning = setTimeout(() => {
                if (!window.firebaseReady && !ENV.hasError()) {
                    const loginError = document.getElementById('loginError');
                    loginError.textContent = "Conectando ao servidor de segurança...";
                    loginError.style.color = "var(--text-secondary)";
                }
            }, 3000);

            await window.waitForFirebase();
            clearTimeout(timeoutWarning);
            
            const googleBtn = document.getElementById('googleLoginBtn');
            const loginError = document.getElementById('loginError');
            
            // Se o Firebase falhou mas o env-loader não disparou erro global
            if (!window.firebaseAuth) {
                document.getElementById('systemError').style.display = 'block';
                return;
            }

            googleBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                
                googleBtn.disabled = true;
                googleBtn.textContent = "Conectando...";
                loginError.textContent = "Abrindo janela de login...";
                loginError.style.color = "var(--text-secondary)";
                
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    const result = await window.firebaseAuth.signInWithPopup(provider);
                    const user = result.user;

                    const token = await user.getIdToken();
                    const maxAge = 7 * 24 * 60 * 60;
                    document.cookie = `firebase_auth_token=${token}; path=/; max-age=${maxAge}; SameSite=Lax`;
                    
                    localStorage.setItem('auth_user', JSON.stringify({ 
                        id: user.uid, 
                        name: user.displayName, 
                        email: user.email,
                        timestamp: Date.now() 
                    }));
                    
                    loginError.textContent = "Login realizado! Redirecionando...";
                    loginError.style.color = "#4caf50";
                    
                    setTimeout(() => {
                        const urlParams = new URLSearchParams(window.location.search);
                        const redirectUrl = urlParams.get('redirect');
                        window.location.href = redirectUrl ? decodeURIComponent(redirectUrl) : "/calendar";
                    }, 1000);
                } catch (error) {
                    console.error("Erro no login Google:", error);
                    googleBtn.disabled = false;
                    googleBtn.textContent = "Entrar com Google";
                    
                    if (error.code === 'auth/popup-closed-by-user') {
                        loginError.textContent = "Login cancelado.";
                    } else if (error.code === 'auth/popup-blocked') {
                        loginError.textContent = "Pop-up bloqueado pelo navegador.";
                    } else {
                        loginError.textContent = "Erro ao entrar com Google.";
                    }
                    loginError.style.color = "var(--error-color)";
                }
            });
        })();
    </script>
</body>
</html>
